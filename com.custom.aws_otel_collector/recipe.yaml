---
RecipeFormatVersion: "2020-01-25"
ComponentName: "com.custom.aws_otel_collector"
ComponentVersion: "{COMPONENT_VERSION}"
ComponentType: "aws.greengrass.generic"
ComponentDescription: "This is a wrapper component for aws-otel-collector"
ComponentPublisher: "{COMPONENT_AUTHOR}"
ComponentDependencies:
  aws.greengrass.TokenExchangeService:
    VersionRequirement: ">=2.0.3"
    DependencyType: "HARD"
Manifests:
- Platform:
    os: "linux"
    architecture: "amd64"
  Lifecycle:
    Install:
      Script: |
        set -eu
        ADOT_VERSION="v0.47.0"
        wget -P {work:path}/com.custom.aws_otel_collector/ https://aws-otel-collector.s3.amazonaws.com/amazon_linux/amd64/${ADOT_VERSION}/aws-otel-collector.rpm
        sudo rpm -Uvh --force {work:path}/com.custom.aws_otel_collector/aws-otel-collector.rpm
        sudo systemctl disable aws-otel-collector
        sudo wget -O /opt/aws/aws-otel-collector/etc/config.yaml https://raw.githubusercontent.com/aws-observability/aws-otel-collector/main/config.yaml
      RequiresPrivilege: true
    Run:
      Script: "/opt/aws/aws-otel-collector/bin/aws-otel-collector --config /opt/aws/aws-otel-collector/etc/config.yaml"
      RequiresPrivilege: true
